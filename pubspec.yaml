name: demo_project
description: "A new Flutter project."



version: 1.0.0+1

environment:
  sdk: ^3.10.1


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  get: ^4.7.2
  http: ^1.3.0
  shared_preferences: ^2.3.0
  connectivity_plus: ^6.1.4
  flutter_svg: ^2.2.4
  intl: ^0.20.3
  image_picker: ^1.2.2
  url_launcher: ^6.3.2
  share_plus: ^13.2.0
  web_socket_channel: ^3.0.3


dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0


flutter:


  uses-material-design: true

  assets:
    - assets/image/
    - assets/icon/
    - assets/font/
  

  fonts:
    - family: Inter
      fonts:
        - asset: assets/font/Inter_18pt-Bold.ttf
       
        - asset: assets/font/Inter_18pt-ExtraBold.ttf
       
        - asset: assets/font/Inter_18pt-ExtraLight.ttf
      
        - asset: assets/font/Inter_18pt-Light.ttf
        - asset: assets/font/Inter_18pt-Regular.ttf
        - asset: assets/font/Inter_24pt-Medium.ttf
        - asset: assets/font/Inter_28pt-SemiBold.ttf
      

      

  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
